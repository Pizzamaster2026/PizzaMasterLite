<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaMasterLite</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🍕 PizzaMasterLite</h1>
    <p class="subtitle">Einfacher Pizzateig-Rechner</p>

    <div class="card">

        <label for="pizzas">Anzahl Pizzen</label>
        <input type="number" id="pizzas" value="2" min="1">

        <label for="weight">Gewicht pro Pizza (g)</label>
        <input type="number" id="weight" value="280" min="100">

        <label for="hydration">Hydration (%)</label>
        <input type="number" id="hydration" value="65" min="40" max="90">

        <label for="salt">Salz (%)</label>
        <input type="number" id="salt" value="3" step="0.1">

    </div>

    <div class="card">

        <h2>Ergebnis</h2>

        <p>🌾 Mehl: <span id="flour">0 g</span></p>
        <p>💧 Wasser: <span id="water">0 g</span></p>
        <p>🧂 Salz: <span id="saltResult">0 g</span></p>
        <hr>
        <p><strong>⚖️ Gesamtteig: <span id="total">0 g</span></strong></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
